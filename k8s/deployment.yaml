apiVersion: apps/v1
kind: Deployment
metadata:
  name: telecom-middleware
  labels:
    app: telecom-middleware
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telecom-middleware
  template:
    metadata:
      labels:
        app: telecom-middleware
    spec:
      containers:
        - name: middleware
          image: rakeshdocker7/telecom-middleware:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8087
          env:
            - name: SERVER_PORT
              value: "8087"
            - name: SOAP_BACKEND_URL
              value: "http://telecom-soap-backend:8090/ws"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

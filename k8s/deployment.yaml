apiVersion: apps/v1
kind: Deployment
metadata:
  name: telecom-middleware
  labels:
    app: telecom-middleware
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: telecom-middleware
  template:
    metadata:
      labels:
        app: telecom-middleware
    spec:
      containers:
        - name: middleware
          image: your-registry/telecom-middleware:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8087
          env:
            - name: SERVER_PORT
              value: "8087"
            - name: SOAP_BACKEND_URL
              value: "http://telecom-soap-backend:8090"
          livenessProbe:
            httpGet:
              path: /api/recharge
              port: 8087
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/recharge
              port: 8087
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
